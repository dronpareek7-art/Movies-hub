<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="100%" stop-color="#b30000"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#000"/>

  <!-- Glow Border -->
  <rect x="5" y="5" width="90" height="90" rx="18"
        fill="none"
        stroke="url(#redGlow)"
        stroke-width="4"
        filter="url(#glow)"/>

  <!-- M (Film Style) -->
  <path d="M25 70 L25 30 L40 50 L55 30 L55 70"
        fill="none"
        stroke="url(#redGlow)"
        stroke-width="6"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Film holes left -->
  <circle cx="22" cy="35" r="2" fill="#ff4d4d"/>
  <circle cx="22" cy="45" r="2" fill="#ff4d4d"/>
  <circle cx="22" cy="55" r="2" fill="#ff4d4d"/>
  <circle cx="22" cy="65" r="2" fill="#ff4d4d"/>

  <!-- Film holes right -->
  <circle cx="58" cy="35" r="2" fill="#ff4d4d"/>
  <circle cx="58" cy="45" r="2" fill="#ff4d4d"/>
  <circle cx="58" cy="55" r="2" fill="#ff4d4d"/>
  <circle cx="58" cy="65" r="2" fill="#ff4d4d"/>
</svg>